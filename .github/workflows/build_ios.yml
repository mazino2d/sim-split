name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      destination:
        description: 'Upload destination'
        default: 'testflight'
        type: choice
        options: [testflight, appstore]
  workflow_call:
    inputs:
      destination:
        type: string
        default: 'testflight'
    secrets:
      IOS_DISTRIBUTION_CERT_BASE64:
        required: false   # not needed until Apple account is active
      IOS_CERT_PASSWORD:
        required: false
      IOS_PROVISION_PROFILE_BASE64:
        required: false
      KEYCHAIN_PASSWORD:
        required: false
      ASC_KEY_ID:
        required: false
      ASC_ISSUER_ID:
        required: false
      ASC_PRIVATE_KEY_BASE64:
        required: false

jobs:
  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-14  # Apple Silicon — required for iOS builds

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (no codesign)
        # --no-codesign: skips cert/provisioning — free, no Apple account needed.
        # Produces build/ios/iphoneos/Runner.app (not distributable, but validates the build).
        run: flutter build ios --release --no-codesign

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: simsplit-ios-unsigned.app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

