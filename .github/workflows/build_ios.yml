name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      destination:
        description: 'Upload destination'
        default: 'testflight'
        type: choice
        options: [testflight, appstore]
  workflow_call:
    inputs:
      destination:
        type: string
        default: 'testflight'
    secrets:
      IOS_DISTRIBUTION_CERT_BASE64:
        required: true
      IOS_CERT_PASSWORD:
        required: true
      IOS_PROVISION_PROFILE_BASE64:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_PRIVATE_KEY_BASE64:
        required: true

jobs:
  build-ios:
    name: Build & Upload IPA
    runs-on: macos-14  # Apple Silicon — required for iOS builds

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install Ruby gems (Fastlane)
        run: |
          cd ios
          bundle install

      - name: Install Apple certificates and provisioning profiles
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # Import certificate
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Install provisioning profile
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode \
            > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS archive
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight via Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ios/fastlane/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          cd ios
          bundle exec fastlane ${{ inputs.destination == 'appstore' && 'release' || 'beta' }}

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f certificate.p12 profile.mobileprovision
          rm -f ios/fastlane/AuthKey_*.p8
          security delete-keychain build.keychain || true
